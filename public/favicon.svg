<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#E0301E"></stop>
      <stop offset="100%" stop-color="#F4831F"></stop>
    </linearGradient>
  </defs>

  <!-- AI Neural Node / Tax Hub -->
  <circle cx="32" cy="32" r="10" fill="url(#g)"></circle>

  <!-- Network Lines -->
  <g stroke="#888" stroke-width="2">
    <line x1="32" y1="32" x2="32" y2="10"></line>
    <line x1="32" y1="32" x2="54" y2="32"></line>
    <line x1="32" y1="32" x2="10" y2="32"></line>
    <line x1="32" y1="32" x2="48" y2="48"></line>
    <line x1="32" y1="32" x2="16" y2="48"></line>
  </g>

  <!-- Nodes -->
  <g fill="#CCC">
    <circle cx="32" cy="10" r="3"></circle>
    <circle cx="54" cy="32" r="3"></circle>
    <circle cx="10" cy="32" r="3"></circle>
    <circle cx="48" cy="48" r="3"></circle>
    <circle cx="16" cy="48" r="3"></circle>
  </g>

  <!-- Subtle Bar Chart -->
  <g fill="url(#g)">
    <rect x="22" y="42" width="4" height="8"></rect>
    <rect x="30" y="38" width="4" height="12"></rect>
    <rect x="38" y="34" width="4" height="16"></rect>
  </g>
</svg>